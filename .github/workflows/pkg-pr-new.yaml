name: pkg-pr-new
on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'playground/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'playground/**'

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare
        run: pnpm dev:prepare

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm prepack

      - name: Publish
        run: pnpm dlx pkg-pr-new publish
